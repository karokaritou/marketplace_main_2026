<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marketplace</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
  <div class="container">
    <a class="navbar-brand d-flex align-items-center" href="{% url 'home' %}">
        🛍️ Marketplace
    </a>

    <div class="d-flex align-items-center">
      {% if user.is_authenticated %}
        <span class="text-white me-3">Hola, <strong>{{ user.username }}</strong></span>
        
        {% if user.is_seller %}
          <a href="{% url 'dashboard' %}" class="btn btn-outline-info btn-sm me-2">
              📊 Panel Vendedor
          </a>
        {% endif %}

        <a href="{% url 'cart_detail' %}" class="btn btn-outline-light btn-sm me-3">
            🛒 Carrito
        </a>

        <a href="{% url 'logout' %}" class="btn btn-danger btn-sm">Logout</a>
      {% else %}
        <a href="{% url 'login' %}" class="btn btn-outline-light btn-sm me-2">Login</a>
        <a href="{% url 'register' %}" class="btn btn-primary btn-sm">Registro</a>
      {% endif %}
    </div>
  </div>
</nav>

<div class="container mt-4">
    {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
